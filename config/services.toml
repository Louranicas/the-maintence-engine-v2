port_range = { start = 10001, end = 10040 }

protocol = "http"
health_endpoint = "/health"
api_prefix = "/api"

capabilities = [
    "distributed_consensus",
    "pbft_voting",
    "agent_coordination"
]

tier = 4
weight = 1.1
priority = 4
synergy_target = 0.985

# PBFT Configuration (n=40, f=13, q=27)
[services.prometheus_swarm.pbft]
n = 40                              # Total agents
f = 13                              # Byzantine fault tolerance
quorum = 27                         # 2f + 1

[services.prometheus_swarm.circuit_breaker]
enabled = true
failure_threshold = 5
timeout_secs = 60
success_threshold = 3

[services.prometheus_swarm.health]
interval_secs = 60
timeout_ms = 200000
unhealthy_threshold = 3

