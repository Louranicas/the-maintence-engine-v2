unhealthy_threshold = 2

# -----------------------------------------------------------------------------
# Global Circuit Breaker Defaults
# -----------------------------------------------------------------------------
[circuit_breaker.defaults]
enabled = true
failure_threshold = 5
timeout_secs = 30
success_threshold = 3
half_open_max_calls = 3

# -----------------------------------------------------------------------------
# Global Retry Defaults
# -----------------------------------------------------------------------------
[retry.defaults]
max_attempts = 3
initial_delay_ms = 500
max_delay_ms = 10000
backoff_multiplier = 2.0
jitter = true
jitter_factor = 0.1

# -----------------------------------------------------------------------------
# Global Health Check Defaults
# -----------------------------------------------------------------------------
[health.defaults]
interval_secs = 30
timeout_ms = 5000
unhealthy_threshold = 3
healthy_threshold = 1

# -----------------------------------------------------------------------------
# Load Balancing
# -----------------------------------------------------------------------------
[load_balancing]
strategy = "weighted"               # round_robin, least_connections, random, weighted
sticky_sessions = false
health_check_filter = true          # Only route to healthy services

# Weighted routing based on tier weights
[load_balancing.weights]
synthex = 1.5                       # Tier 1
sank7 = 1.5                         # Tier 1
nais = 1.3                          # Tier 2
codesynthor = 1.3                   # Tier 2
devops_engine = 1.3                 # Tier 2
tool_library = 1.2                  # Tier 3
library_agent = 1.2                 # Tier 3
ccm = 1.2                           # Tier 3
prometheus_swarm = 1.1              # Tier 4
architect_agent = 1.1               # Tier 4
bash_engine = 1.0                   # Tier 5
tool_maker = 1.0                    # Tier 5

# -----------------------------------------------------------------------------
# Service Mesh Observability
# -----------------------------------------------------------------------------
[observability]
# Tracing
trace_all_requests = true
trace_sample_rate = 0.1             # 10% sampling in production

# Metrics
collect_latency = true
collect_error_rate = true
collect_throughput = true
collect_synergy = true              # Track cross-service synergy

# Logging
log_requests = true
log_responses = false               # Can be verbose
log_errors = true

# -----------------------------------------------------------------------------
# Cross-Service Synergy Tracking
# -----------------------------------------------------------------------------
[synergy]
# Synergy thresholds
minimum_threshold = 0.85            # Below this triggers alert
target_threshold = 0.93             # System-wide target
excellent_threshold = 0.98          # Excellent synergy

# Synergy measurement
measurement_interval_secs = 60
history_retention_days = 30
