# =============================================================================
# The Maintenance Engine - ULTRAPLATE 12-Service Mesh Configuration
# =============================================================================
# Configuration for ULTRAPLATE 12-Service Architecture integration
# Port: 8080 | 36 Modules | 6 Layers | 12D Tensor | PBFT n=40, f=13, q=27
# =============================================================================

# -----------------------------------------------------------------------------
# Service Discovery
# -----------------------------------------------------------------------------
[discovery]
# Discovery method
method = "static"                   # static, consul, kubernetes, dns
refresh_interval_secs = 60          # How often to refresh service list

# -----------------------------------------------------------------------------
# The Maintenance Engine (Self)
# -----------------------------------------------------------------------------
[services.maintenance_engine]
name = "The Maintenance Engine"
id = "maintenance-engine"
version = "1.0.0"
port = 8080
grpc_port = 8081
websocket_port = 8082
host = "localhost"

# Endpoints
health_endpoint = "/api/health"
metrics_endpoint = "/metrics"
api_prefix = "/api"

# Capabilities
capabilities = [
    "service_monitoring",
    "health_checking",
    "log_processing",
    "auto_remediation",
    "hebbian_learning",
    "pbft_consensus",
    "tensor_encoding",
    "service_discovery"
]

# NAM compliance
[services.maintenance_engine.nam]
target_compliance = 0.92
human_agent_id = "@0.A"

# -----------------------------------------------------------------------------
# SYNTHEX Engine (Tier 1)
# -----------------------------------------------------------------------------
[services.synthex]
name = "SYNTHEX Engine"
id = "synthex"
version = "1.0.0"
host = "localhost"
port = 8090
websocket_port = 8091

protocol = "http"
health_endpoint = "/api/health"
api_prefix = "/api"

capabilities = [
    "pattern_synthesis",
    "code_generation",
    "semantic_analysis"
]

# Priority and weight (from default.toml)
tier = 1
weight = 1.5
priority = 1
synergy_target = 0.950

[services.synthex.circuit_breaker]
enabled = true
failure_threshold = 5
timeout_secs = 30
success_threshold = 3

[services.synthex.retry]
max_attempts = 3
initial_delay_ms = 500
max_delay_ms = 5000
backoff_multiplier = 2.0

[services.synthex.health]
interval_secs = 30
timeout_ms = 10000
unhealthy_threshold = 3

# -----------------------------------------------------------------------------
# SAN-K7 Orchestrator (Tier 1)
# -----------------------------------------------------------------------------
[services.sank7]
name = "SAN-K7 Orchestrator"
id = "san-k7"
version = "1.55.0"
host = "localhost"
port = 8100

protocol = "http"
health_endpoint = "/health"
api_prefix = "/api"

capabilities = [
    "module_orchestration",
    "workflow_management",
    "task_scheduling"
]

tier = 1
weight = 1.5
priority = 1
synergy_target = 0.992

[services.sank7.circuit_breaker]
enabled = true
failure_threshold = 5
timeout_secs = 30
success_threshold = 3

[services.sank7.retry]
max_attempts = 3
initial_delay_ms = 500
max_delay_ms = 5000
backoff_multiplier = 2.0

[services.sank7.health]
interval_secs = 30
timeout_ms = 10000
unhealthy_threshold = 3

# SAN-K7 has Maintenance Engine integration module
[services.sank7.integration]
module_id = "M6.2"
bridge_type = "bidirectional"

